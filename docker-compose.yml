services:
  pstg:
    image: postgres:16-alpine
    container_name: pstg
    restart: always
    environment:
      - POSTGRES_PASSWORD=gescol
      - POSTGRES_USER=gescol
      - POSTGRES_DB=gescol
    ports:
      - "5432:5432"
    volumes:
      - gescol-data:/var/lib/postgresql/data
      - ./src/db/script_escuela.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./src/db/script_usability.sql:/docker-entrypoint-initdb.d/02_usability_data.sql
      - ./src/db/scrip_test.sql:/docker-entrypoint-initdb.d/03_test_data.sql
    networks:
      - gescol-network

  gescol-backend:
    build: .
    container_name: gescol-backend
    restart: always
    ports:
      - "3001:3001"
    depends_on:
      - pstg
    networks:
      - gescol-network

networks:
  gescol-network:
    driver: bridge

volumes:
  gescol-data: